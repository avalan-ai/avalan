name: Update Poetry lock

on:
  workflow_dispatch:
    inputs:
      regenerate:
        description: 'Fully re-resolve all dependency versions.'
        required: false
        default: false
        type: boolean

concurrency:
  group: poetry-lock
  cancel-in-progress: true

jobs:
  lock-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.name  "poetry‑lock bot"
          git config --local user.email "poetry-lock[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Load cached Poetry installation
        id: cached-poetry
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: poetry-v4-2.4.1

      - name: Load cached Poetry package metadata
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/cache
          key: poetry-repositories-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            poetry-repositories-${{ runner.os }}-

      - name: Install Poetry
        if: steps.cached-poetry.outputs.cache-hit != 'true'
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1
          installer-parallel: true
        env:
          POETRY_VIRTUALENVS_CREATE: "false"

      - name: Update poetry.lock
        if: ${{ !inputs.regenerate }}
        run: poetry lock --no-ansi --no-interaction

      - name: Regenerate poetry.lock
        if: ${{ inputs.regenerate }}
        run: poetry lock --no-ansi --no-interaction --regenerate

      - name: Create or update Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sign-commits: true
          commit-message: 'Update poetry.lock'
          branch: workflow/update-poetry-lock
          title: 'Update poetry.lock'
          body: |
            This pull request was automatically generated by the **update‑poetry‑lock** workflow.
            It refreshes the lock file for the dependency versions specified in *pyproject.toml*.
          delete-branch:  true

      - name: Post‑run summary
        run: |
          if [[ -z "${{ steps.cpr.outputs.pull-request-number }}" ]]; then
            echo "✅ poetry.lock already up‑to‑date – no PR created."
          else
            echo "📌 Created or updated PR #${{ steps.cpr.outputs.pull-request-number }}."
          fi
