[flow]
name = "graph_duplicate_edge_id"
version = "1"

[[inputs]]
name = "payload"
type = "object"

[[outputs]]
name = "profile"
type = "object"

[entry]
type = "node"
node = "start"

[output_behavior]
type = "map"

[output_behavior.outputs]
profile = "pick.value"

[graph]
format = "mermaid"
source = "inline"
mode = "executable"
diagram = '''
flowchart LR
start route_profile@-->|private visual label| pick
pick route_profile@--> done
'''

[nodes.start]
type = "input"

[nodes.pick]
type = "pass-through"

[nodes.done]
type = "select"

[nodes.done.mapping.value]
type = "object"

[nodes.done.mapping.value.fields]
name = "input.payload.name"
