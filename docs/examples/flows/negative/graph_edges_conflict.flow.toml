[flow]
name = "graph_edges_conflict"
version = "1"

[[inputs]]
name = "payload"
type = "object"

[[outputs]]
name = "profile"
type = "object"

[entry]
type = "node"
node = "start"

[output_behavior]
type = "map"

[output_behavior.outputs]
profile = "pick.value"

[graph]
format = "mermaid"
source = "inline"
mode = "executable"
diagram = '''
flowchart LR
start route_profile@--> pick
'''

[nodes.start]
type = "input"

[nodes.pick]
type = "select"

[nodes.pick.mapping.value]
type = "object"

[nodes.pick.mapping.value.fields]
name = "input.payload.name"

[[edges]]
source = "start"
target = "pick"
kind = "success"
