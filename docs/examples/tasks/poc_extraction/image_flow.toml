[flow]
name = "poc_invoice_extraction_image_flow"
version = "1"
description = "Extract invoice line items from rendered PDF page images."

[[inputs]]
name = "input"
type = "file[]"
mime_types = ["application/pdf"]

[[outputs]]
name = "extraction"
type = "object"
schema_ref = "invoice.schema.json"

[entry]
type = "node"
node = "render_pages"

[output_behavior]
type = "map"

[output_behavior.outputs]
extraction = "extract.result"

[[edges]]
source = "render_pages"
target = "extract"

[nodes.render_pages]
type = "file_convert"
output = "files"

[nodes.render_pages.mapping.files]
type = "file[]"
source = "input.input"

[nodes.render_pages.config]
converter = "pdf_image"
format = "png"
dpi = 144
pages = "1.."
max_pages = 20
max_pixels_per_page = 12000000
max_total_pixels = 120000000

[nodes.extract]
type = "agent"
ref = "agent.toml"
input = "input"
output = "extraction"

[nodes.extract.mapping]
input = "input.input"

[nodes.extract.mapping.render_pages]
type = "object"

[nodes.extract.mapping.render_pages.fields]
files = "render_pages.files"

[nodes.extract.config]
files_input = "render_pages.files"
file_policy = "replace"
