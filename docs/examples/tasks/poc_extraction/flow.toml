[flow]
name = "poc_invoice_extraction_flow"
version = "1"
description = "Extract invoice line items from one PDF through a flow."

[[inputs]]
name = "input"
type = "file"
mime_types = ["application/pdf"]

[[outputs]]
name = "extraction"
type = "object"
schema_ref = "invoice.schema.json"

[entry]
type = "node"
node = "extract"

[output_behavior]
type = "map"

[output_behavior.outputs]
extraction = "extract.result"

[privacy]
input = "drop"
prompt = "drop"
output = "drop"
files = "drop"
file_bytes = "drop"
token_text = "drop"
tool_arguments = "drop"
tool_results = "drop"
events = "drop"
errors = "drop"
raw_retention_days = 0

[nodes.extract]
type = "agent"
ref = "agent.toml"
input = "input"

[nodes.extract.mapping]
input = "input.input"
