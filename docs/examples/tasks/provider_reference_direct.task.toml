[task]
name = "provider_reference_direct"
version = "1"
description = "Use provider-owned file references in a direct task."
labels = ["example", "provider-file"]

[input]
type = "file"
description = "Provider-native file descriptor."
mime_types = ["application/pdf", "image/png", "text/plain"]

[output]
type = "text"
description = "Provider file summary."

[execution]
type = "agent"
ref = "agents/document_reader.toml"

[run]
mode = "direct"
timeout_seconds = 180
idempotency = "input_and_files_hash"

[artifact]
retention_days = 7
storage = "local"
max_count = 2
max_bytes = 1048576

[limits]
file_count = 1
file_bytes = 1048576
output_bytes = 8192
total_tokens = 3000
