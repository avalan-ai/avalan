[target]
shell_execution_modes = ["container", "sandbox", "local"]
container_backends = ["apple-container", "docker"]
sandbox_backends = ["seatbelt", "bubblewrap"]

[rejected_values]
unknown_shell_execution_modes = ["host", "direct", "native", "none"]
legacy_container_backends = [
    "podman",
    "nerdctl",
    "containerd",
    "containerd/nerdctl",
    "microsoft-containers",
    "windows-docker",
    "wsl2",
    "hyper-v",
    "auto",
    "none",
    "container",
]
unknown_container_backends = ["firejail", "nsjail", "gvisor"]
unknown_sandbox_backends = [
    "apple-container",
    "docker",
    "podman",
    "firejail",
    "nsjail",
    "auto",
    "none",
]

[current_reality.apple_container]
status = "implemented"
site = "src/avalan/container/apple.py::AppleContainerBackend"
notes = "Apple Container has a concrete async backend adapter and fake/live tests."

[current_reality.docker]
status = "implemented"
concrete_backend_exists = true
notes = "Docker has a concrete async backend adapter and fake/live-gated tests."

[ci.default]
jobs = [
    "isolation phase0 static inventory",
    "container fake-e2e no-fallback",
    "apple-container fake backend coverage",
    "docker fake backend coverage after Docker backend lands",
    "seatbelt fake backend coverage after sandbox backend lands",
    "bubblewrap fake backend coverage after sandbox backend lands",
]

[[ci.optional_real_runtime_jobs]]
runtime = "docker"
job = "isolation real Docker e2e"
gate = "AVALAN_CONTAINER_DOCKER_E2E=1"
status = "optional gated by Docker availability and digest-pinned image"

[[ci.optional_real_runtime_jobs]]
runtime = "apple-container"
job = "isolation real Apple Container e2e"
gate = "AVALAN_CONTAINER_APPLE_E2E=1 and AVALAN_CONTAINER_APPLE_E2E_IMAGE"
status = "implemented and optional"

[[ci.optional_real_runtime_jobs]]
runtime = "seatbelt"
job = "isolation real seatbelt e2e"
gate = "AVALAN_ISOLATION_SEATBELT_E2E=1"
status = "blocked until sandbox backend exists"

[[ci.optional_real_runtime_jobs]]
runtime = "bubblewrap"
job = "isolation real bubblewrap e2e"
gate = "AVALAN_ISOLATION_BUBBLEWRAP_E2E=1"
status = "blocked until sandbox backend exists"

[phase0_exit_conditions.fake_e2e_sdk_cli_toml_snapshots]
status = "partial"
reason = "Existing SDK, CLI, and TOML tests cover current local/container shell settings, Docker catalog strings, and Apple Container wiring, but they cannot expose only target active values until Phase 1 removes legacy container backends and Phase 2 adds sandbox settings."
blocking_values = ["podman", "nerdctl", "windows-docker", "auto", "none"]
blocking_missing_values = ["sandbox", "seatbelt", "bubblewrap"]
evidence = [
    "tests/agent/loader_test.py",
    "tests/cli/main_test.py",
    "tests/cli/agent_test.py",
    "tests/tool/shell/container_test.py",
    "tests/container/apple_test.py",
]

