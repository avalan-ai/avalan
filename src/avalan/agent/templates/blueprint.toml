[agent]
{% if orchestrator.agent_config.get('name') %}
name = "{{ orchestrator.agent_config['name'] }}"
{% endif %}
{% if orchestrator.agent_config.get('system') %}
system = """
{{ orchestrator.agent_config['system'] | indent(4) }}
"""
{% endif %}
{% if orchestrator.agent_config.get('developer') %}
developer = """
{{ orchestrator.agent_config['developer'] | indent(4) }}
"""
{% endif %}
{% if orchestrator.agent_config.get('role') %}
role = """
{{ orchestrator.agent_config['role'] | indent(4) }}
"""
{% endif %}
{% if orchestrator.agent_config.get('task') %}
task = """
{{ orchestrator.agent_config['task'] | indent(4) }}
"""
{% endif %}
{% if orchestrator.agent_config.get('instructions') %}
instructions = """
{{ orchestrator.agent_config['instructions'] | indent(4) }}
"""
{% endif %}
{% if orchestrator.agent_config.get('goal_instructions') %}
goal_instructions = """
{{ orchestrator.agent_config['goal_instructions'] | indent(4) }}
"""
{% endif %}
{% if orchestrator.agent_config.get('user') %}
user = """
{{ orchestrator.agent_config['user'] | indent(4) }}
"""
{% endif %}
{% if orchestrator.agent_config.get('user_template') %}
user_template = "{{ orchestrator.agent_config['user_template'] }}"
{% endif %}

[memory]
recent = {{ orchestrator.memory_recent | lower }}
{% if orchestrator.memory_permanent_message %}
permanent_message = "{{ orchestrator.memory_permanent_message }}"
{% endif %}

[memory.engine]
model_id = "{{ orchestrator.sentence_model_id }}"
max_tokens = {{ orchestrator.sentence_model_max_tokens }}
overlap_size = {{ orchestrator.sentence_model_overlap_size }}
window_size = {{ orchestrator.sentence_model_window_size }}

[engine]
uri = "{{ orchestrator.uri }}"

[run]
max_new_tokens = {{ orchestrator.call_options['max_new_tokens'] }}
skip_special_tokens = {{ orchestrator.call_options['skip_special_tokens'] | lower }}
{% if orchestrator.call_options.get('temperature') is not none %}
temperature = {{ orchestrator.call_options['temperature'] }}
{% endif %}
{% if orchestrator.call_options.get('top_k') is not none %}
top_k = {{ orchestrator.call_options['top_k'] }}
{% endif %}
{% if orchestrator.call_options.get('top_p') is not none %}
top_p = {{ orchestrator.call_options['top_p'] }}
{% endif %}
{% if orchestrator.call_options.get('use_cache') is not none %}
use_cache = {{ orchestrator.call_options['use_cache'] | lower }}
{% endif %}
{% if orchestrator.call_options.get('cache_strategy') %}
cache_strategy = "{{ orchestrator.call_options['cache_strategy'] }}"
{% endif %}
{% if orchestrator.call_options.get('openai_max_retries') is not none %}
openai_max_retries = {{ orchestrator.call_options['openai_max_retries'] }}
{% endif %}
{% if orchestrator.call_options.get('openai_response_failed_retries') is not none %}
openai_response_failed_retries = {{ orchestrator.call_options['openai_response_failed_retries'] }}
{% endif %}
{% if orchestrator.call_options.get('openai_response_failed_retry_delay_seconds') is not none %}
openai_response_failed_retry_delay_seconds = {{ orchestrator.call_options['openai_response_failed_retry_delay_seconds'] }}
{% endif %}
{% if orchestrator.call_options.get('openai_timeout_seconds') is not none %}
openai_timeout_seconds = {{ orchestrator.call_options['openai_timeout_seconds'] }}
{% endif %}
{% if orchestrator.call_options.get('maximum_tool_cycles') is not none %}
{% if orchestrator.call_options['maximum_tool_cycles'] is number %}maximum_tool_cycles = {{ orchestrator.call_options['maximum_tool_cycles'] }}
{% else %}maximum_tool_cycles = "{{ orchestrator.call_options['maximum_tool_cycles'] }}"
{% endif %}
{% endif %}
{% if orchestrator.call_options.get('block_repeated_tool_calls') is not none %}
block_repeated_tool_calls = {{ orchestrator.call_options['block_repeated_tool_calls'] | lower }}
{% endif %}
{% if orchestrator.call_options.get('chat_settings') %}

[run.chat]
{% for key, value in orchestrator.call_options['chat_settings'].items() %}
{{ key }} = {{ value | toml_value }}
{% endfor %}
{% endif %}
{% if orchestrator.call_options.get('reasoning') %}

# Reasoning request settings are provider-dependent. A summary value, when
# present, is one of "auto", "concise", or "detailed". Display remains a CLI
# concern controlled independently with --display-reasoning.
[run.reasoning]
{% for key, value in orchestrator.call_options['reasoning'].items() %}
{{ key }} = {{ value | toml_value }}
{% endfor %}
{% endif %}

{% if orchestrator.tools or tool_format or tool_recovery_formats or tool_name_policy %}
[tool]
{% if tool_format %}format = "{{ tool_format }}"
{% endif %}
{% if tool_recovery_formats %}recovery_formats = [
{% for recovery_format in tool_recovery_formats %}    "{{ recovery_format }}"{% if not loop.last %},{% endif %}
{% endfor %}
]
{% endif %}
{% if orchestrator.tools %}enable = [
{% for tool in orchestrator.tools %}    "{{ tool }}"{% if not loop.last %},{% endif %}
{% endfor %}
]
{% endif %}
{% endif %}
{% if tool_name_policy %}

[tool.name_policy]
mode = "{{ tool_name_policy.mode }}"
prefix = "{{ tool_name_policy.prefix }}"
replacement = "{{ tool_name_policy.replacement }}"
collapse_replacement = {{ tool_name_policy.collapse_replacement | lower }}
{% if tool_name_policy.provider_family %}provider_family = "{{ tool_name_policy.provider_family }}"
{% endif %}
{% if tool_name_policy.map %}

[tool.name_policy.map]
{% for canonical, provider in tool_name_policy.map.items() %}"{{ canonical }}" = "{{ provider }}"
{% endfor %}
{% endif %}
{% endif %}

{% if skills_tool %}
[tool.skills]
{% for k, v in skills_tool.items() %}
{% if v is not mapping %}
{{ k }} = {{ v | toml_value }}
{% endif %}
{% endfor %}
{% for section, values in skills_tool.items() %}
{% if values is mapping %}

[tool.skills.{{ section }}]
{% for k, v in values.items() %}
{{ k }} = {{ v | toml_value }}
{% endfor %}
{% endif %}
{% endfor %}

{% endif %}

{% if browser_tool %}
[tool.browser.open]
{% for k, v in browser_tool.items() %}
{% if v is boolean %}
{{ k }} = {{ v | lower }}
{% elif v is number %}
{{ k }} = {{ v }}
{% elif v is string %}
{{ k }} = "{{ v }}"
{% endif %}
{% endfor %}
{% endif %}

{% if graph_tool %}
[tool.graph]
{% for k, v in graph_tool.items() %}
{% if v is string %}
{{ k }} = "{{ v }}"
{% endif %}
{% endfor %}
{% endif %}

{% if database_tool %}
[tool.database]
{% for k, v in database_tool.items() %}
{% if v is number %}
{{ k }} = {{ v }}
{% else %}
{{ k }} = "{{ v }}"
{% endif %}
{% endfor %}
{% endif %}

{% if container_tool %}
[tool.container]
{% if container_tool.get('backend') %}backend = "{{ container_tool['backend'] }}"
{% endif %}
{% if container_tool.get('default_profile') %}default_profile = "{{ container_tool['default_profile'] }}"
{% endif %}
{% for name, profile in container_tool.get('profiles', {}).items() %}
[tool.container.profiles."{{ name }}"]
{% for k, v in profile.items() %}
{% if k != 'resources' %}
{% if v is number %}
{{ k }} = {{ v }}
{% else %}
{{ k }} = "{{ v }}"
{% endif %}
{% endif %}
{% endfor %}
{% if profile.get('resources') %}
[tool.container.profiles."{{ name }}".resources]
{% for k, v in profile['resources'].items() %}
{{ k }} = {{ v }}
{% endfor %}
{% endif %}
{% endfor %}
{% endif %}

{% if sandbox_tool %}
[tool.sandbox]
{% if sandbox_tool.get('backend') %}backend = "{{ sandbox_tool['backend'] }}"
{% endif %}
{% if sandbox_tool.get('default_profile') %}default_profile = "{{ sandbox_tool['default_profile'] }}"
{% endif %}
{% for name, profile in sandbox_tool.get('profiles', {}).items() %}
[tool.sandbox.profiles."{{ name }}"]
{% for k, v in profile.items() %}
{% if k not in ['environment', 'network', 'resources', 'output'] %}
{% if v is boolean %}
{{ k }} = {{ v | lower }}
{% elif v is number %}
{{ k }} = {{ v }}
{% elif v is string %}
{{ k }} = "{{ v }}"
{% else %}
{{ k }} = [
{% for item in v %}    "{{ item }}"{% if not loop.last %},{% endif %}
{% endfor %}
]
{% endif %}
{% endif %}
{% endfor %}
{% if profile.get('network') %}
[tool.sandbox.profiles."{{ name }}".network]
{% for k, v in profile['network'].items() %}
{% if v is string %}
{{ k }} = "{{ v }}"
{% else %}
{{ k }} = [
{% for item in v %}    "{{ item }}"{% if not loop.last %},{% endif %}
{% endfor %}
]
{% endif %}
{% endfor %}
{% endif %}
{% if profile.get('resources') %}
[tool.sandbox.profiles."{{ name }}".resources]
{% for k, v in profile['resources'].items() %}
{{ k }} = {{ v }}
{% endfor %}
{% endif %}
{% if profile.get('output') %}
[tool.sandbox.profiles."{{ name }}".output]
{% for k, v in profile['output'].items() %}
{% if v is boolean %}
{{ k }} = {{ v | lower }}
{% else %}
{{ k }} = {{ v }}
{% endif %}
{% endfor %}
{% endif %}
{% endfor %}
{% endif %}

{% if shell_tool is not none %}
[tool.shell]
{% for k, v in shell_tool.items() %}
{% if k != 'git' %}
{% if v is boolean %}
{{ k }} = {{ v | lower }}
{% elif v is number %}
{{ k }} = {{ v }}
{% elif v is string %}
{{ k }} = {{ v | toml_value }}
{% elif v is mapping %}
{{ k }} = { {% for key, item in v.items() %}{{ key }} = {{ item | toml_value }}{% if not loop.last %}, {% endif %}{% endfor %} }
{% else %}
{{ k }} = [
{% for item in v %}    {{ item | toml_value }}{% if not loop.last %},{% endif %}
{% endfor %}
]
{% endif %}
{% endif %}
{% endfor %}
{% endif %}

{% if shell_tool and shell_tool.get('git') %}
[tool.shell.git]
{% for k, v in shell_tool['git'].items() %}
{{ k }} = {{ v | toml_value }}
{% endfor %}
{% endif %}

{% if shell_sandbox %}
[tool.shell.sandbox]
{% for k, v in shell_sandbox.items() %}
{% if v is boolean %}
{{ k }} = {{ v | lower }}
{% else %}
{{ k }} = "{{ v }}"
{% endif %}
{% endfor %}
{% endif %}

{% if shell_container %}
[tool.shell.container]
{% for k, v in shell_container.items() %}
{% if v is boolean %}
{{ k }} = {{ v | lower }}
{% else %}
{{ k }} = "{{ v }}"
{% endif %}
{% endfor %}
{% endif %}
