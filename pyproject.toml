  "diffusers>=0.38.0,<0.39.0",
  "google-genai>=1.28.0,<2.0.0",
  "openai>=2.0.0,<3.0.0",
  "pillow>=12.2.0,<13.0",
  "safetensors>=0.8.0rc0,<0.9.0",
]
vision = [
  "diffusers>=0.38.0,<0.39.0",
  "imageio>=2.37.0,<3.0.0",
  "imageio-ffmpeg>=0.6.0,<0.7.0",
  "opencv-python>=4.12.0.88,<5.0.0",
  "pillow>=12.2.0,<13.0",
  "safetensors>=0.8.0rc0,<0.9.0",
  "torchvision>=0.26.0,<0.27.0 ; python_full_version != '3.14.1'",
]
vllm = [
  "vllm>=0.21.0,<0.22.0 ; platform_system == 'Linux' and python_version < '3.14'",
]
mlx = [
  "mlx>=0.31.2,<0.32.0 ; platform_system == 'Darwin' and platform_machine == 'arm64'",
  "mlx-lm>=0.31.3,<0.32.0 ; platform_system == 'Darwin' and platform_machine == 'arm64'",
]
apple = [
  "mlx>=0.31.2,<0.32.0 ; platform_system == 'Darwin' and platform_machine == 'arm64'",
  "mlx-lm>=0.31.3,<0.32.0 ; platform_system == 'Darwin' and platform_machine == 'arm64'",
]
ds4 = [
  "pyds4>=1.0.2,<2.0.0 ; platform_system == 'Linux' or (platform_system == 'Darwin' and platform_machine == 'arm64')",
]
nvidia = [
  "vllm>=0.21.0,<0.22.0 ; platform_system == 'Linux' and python_version < '3.14'",
  "bitsandbytes>=0.46.1,<0.47.0 ; platform_system == 'Linux'",
]

[tool.black]
line-length = 79
target-version = ["py311"]

[tool.ruff]
line-length   = 79  # PEP 8
indent-width  = 4
src           = ["src"]
fix           = true
target-version = "py311" # PEP 585, 604, 634–636
preview        = true

[tool.ruff.format]
indent-style               = "space"
line-ending                = "auto"
quote-style                = "double"
docstring-code-format      = true
skip-magic-trailing-comma  = false

[tool.ruff.lint]
select = [
  "E",       # PEP 8 errors
  "W",       # PEP 8 warnings
  "F",       # Flake8 (pyflakes) errors
  "D",       # pydocstyle (PEP 257) docstring checks
  "I",       # isort import sorting
  "UP006",   # non-PEP585 — migrate typing.List → list etc.
  "UP007",   # non-PEP604-union — migrate Union[X, Y] → X | Y
  "UP045",   # non-PEP604-optional — migrate Optional[X] → X | None
]
ignore = [
  "D100",  # Missing docstring in public module
  "D101",  # Missing docstring in public class
  "D102",  # Missing docstring in public method
  "D103",  # Missing docstring in public function
  "D104",  # Missing docstring in public package
  "D105",  # Missing docstring in magic method
  "D107",  # Missing docstring in `__init__`
  "D400",  # First line should end with a period
]

[tool.ruff.lint.isort]
section-order = ["local-folder", "future", "standard-library", "third-party", "first-party"]
known-first-party = ["avalan"]

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = false

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.poetry]
version = "1.4.11"

[tool.poetry.group.test]
optional = true

[tool.poetry.group.test.dependencies]
matplotlib = ">=3.8.0,<4.0.0"
pyds4 = {version = ">=1.0.2,<2.0.0", markers = "platform_system == 'Linux' or (platform_system == 'Darwin' and platform_machine == 'arm64')"}
pytest = ">=9.0.3,<10.0.0"
pytest-cov = ">=6.2.1,<7.0.0"

[tool.poetry.group.dev.dependencies]
ruff = "^0.15.13"
black = "^26.3.1"
mypy = "^2.1.0"
pydantic = "^2.12.5"

[tool.poetry-dynamic-versioning]
enable = true

[tool.mypy]
files = ["src/avalan"]
plugins = ["pydantic.mypy"]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
show_error_codes = true
show_column_numbers = true
show_error_context = true
show_error_code_links = true
pretty = true
exclude_gitignore = true
local_partial_types = true
check_untyped_defs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true
disable_error_code = ["override"]
enable_error_code = ["ignore-without-code"]

[tool.pydantic-mypy]
init_typed = true
init_forbid_extra = true
warn_required_dynamic_aliases = true

[[tool.mypy.overrides]]
module = [
  "a2a",
  "aioboto3",
  "anyio",
  "boto3",
  "boto3.*",
  "botocore",
  "botocore.*",
  "bs4",
  "entmax",
  "faiss",
  "fastapi",
  "fastapi.*",
  "huggingface_hub",
  "huggingface_hub.*",
  "httpx",
  "jinja2",
  "keyring",
  "keyring.*",
  "markitdown",
  "numpy",
  "ollama",
  "pgvector.*",
  "psutil",
  "pypdf",
  "RestrictedPython",
  "rich",
  "rich.*",
  "sympy",
  "sympy.*",
  "tokenizers",
  "tiktoken",
  "tiktoken.*",
  "torchaudio",
  "torchaudio.*",
  "torch",
  "torch.*",
  "tqdm",
  "tqdm.*",
  "transformers",
  "transformers.*",
  "uvicorn",
  "vllm",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tiktoken", "tiktoken.*"]
follow_imports = "skip"
