[build-system]
requires = ["poetry-core>=2.1.3", "poetry-dynamic-versioning>=1.9.1"]
build-backend = "poetry_dynamic_versioning.backend"

[project]
name = "avalan"
dynamic = ["version"]
description = "Multi-backend, multi-modal micro-framework for AI agent development, orchestration, and deployment"
readme = { file = "README.md", content-type = "text/markdown" }
license = { text = "MIT" }
authors = [
  { name = "The Avalan Team", email = "avalan@avalan.ai" },
]
requires-python = ">=3.11,<3.15"
dependencies = [
  "packaging>=24.0,<27.0",
  "humanize>=4.12.3,<5.0.0",
  "rich>=13.7.0,<16.0.0",
  "tiktoken>=0.6.0,<1.0.0",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Education",
  "Intended Audience :: Science/Research",
  "Topic :: Software Development :: Libraries",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Operating System :: OS Independent"
]

[project.urls]
homepage = "https://avalan.ai"
repository = "https://github.com/avalan-ai/avalan"
documentation = "https://github.com/avalan-ai/avalan#readme"
"Bug Tracker" = "https://github.com/avalan-ai/avalan/issues"

[project.scripts]
avl = "avalan.cli.__main__:main"
avalan = "avalan.cli.__main__:main"

[project.optional-dependencies]
local = [
  "huggingface-hub>=1.0.0,<2.0.0",
  "hf-xet>=1.4.3,<2.0.0 ; platform_machine == 'x86_64' or platform_machine == 'amd64' or platform_machine == 'AMD64' or platform_machine == 'arm64' or platform_machine == 'aarch64'",
  "torch>=2.11.0,<2.12.0",
  "transformers>=5.5.4,<6.0.0",
  "accelerate>=1.9.0,<2.0.0",
  "sentence-transformers>=5.4.1,<6.0.0",
]

agent = [
  "jinja2>=3.1.6,<4.0.0",
]
audio = [
  "soundfile>=0.13.1,<0.14.0",
  "torchaudio>=2.11.0,<2.12.0",
]
memory = [
  "beautifulsoup4>=4.14.2,<5.0.0",
  "boto3>=1.40.3,<2.0.0",
  "faiss-cpu>=1.14.2,<2.0.0",
  "markitdown[pdf]>=0.1.2,<0.2.0 ; python_version < '3.14'",
  "markdownify>=1.1.0,<2.0.0",
  "psycopg[pool]>=3.2.9,<4.0.0",
  "psycopg-binary>=3.2.9,<4.0.0 ; python_version < '3.14'",
  "pgvector>=0.4.1,<0.5.0",
  "pypdf>=6.10.2,<7.0.0",
  "tree-sitter>=0.25.1,<0.26.0",
  "tree-sitter-python>=0.23.6,<0.24.0",
  "elasticsearch>=9.1.0,<10.0.0",
]
quantization = [
  "bitsandbytes>=0.46.1,<0.47.0 ; platform_system == 'Linux'",
]
server = [
  "fastapi>=0.101.0,<1.0.0",
  "mcp>=1.23.0,<2.0.0",
  "pydantic>=2.0,<3.0.0",
  "uvicorn>=0.27.0,<1.0.0",
]

tool = [
  "aiomysql>=0.3.0,<0.4.0",
  "asyncpg>=0.29.0,<0.32.0",
  "matplotlib>=3.6.0,<4.0.0",
  "SQLAlchemy>=2.0.43,<3.0.0",
  "sqlglot>=22.0,<31.0.0",
  "sympy>=1.12,<2.0.0",
]
code = [
  "RestrictedPython>=8.0,<9.0.0",
]
browser = [
  "playwright>=1.54.0,<2.0.0",
]
youtube = [
  "youtube-transcript-api>=1.2.2,<2.0.0",
]
secrets = [
  "boto3>=1.40.3,<2.0.0",
  "keyring>=25.6.0,<26.0.0",
]
translation = [
  "protobuf>=6.31.1,<7.0.0",
  "sentencepiece>=0.2.0,<0.3.0",
]
a2a = [
  "a2a-sdk>=0.3.6,<0.4.0",
]

litellm = [
  "litellm>=1.83.7,<2.0.0 ; python_version < '3.14'",
